<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Enter the Network</title>
    <style>
        body {
            margin: 0;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #inputOverlay {
            position: fixed;
            top: 80%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: none;
            text-align: center;
        }

        #inputPrompt {
            color: white;
            font-size: 24px;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        #thoughtInput {
            width: 320px;
            padding: 12px 16px;
            font-size: 18px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #8fdfff;
            outline: none;
        }
    </style>
    <script type="module" src="Enter the Network.js"></script>


</head>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
  }
}
</script>


<body>
    <!-- canvas that we custom made-->
    <canvas id="three-ex"></canvas>
    <div id="inputOverlay">
        <div id="inputPrompt">Share a thought.</div>
        <input id="thoughtInput" type="text" placeholder="Type here..." />
    </div>
</body>

</html>
